services:
  postgres:
    image: postgres:16-alpine
    container_name: gmb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmb_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gmb_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: