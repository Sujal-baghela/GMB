apiVersion: v1
kind: Secret
metadata:
  name: gbp-secrets
  namespace: gbp
type: Opaque
data:
  # Base64 encoded secrets - replace with actual values
  JWT_SECRET: {{ base64 encoded JWT_SECRET }}
  JWT_REFRESH_SECRET: {{ base64 encoded JWT_REFRESH_SECRET }}
  GOOGLE_CLIENT_ID: {{ base64 encoded GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: {{ base64 encoded GOOGLE_CLIENT_SECRET }}
  STRIPE_SECRET_KEY: {{ base64 encoded STRIPE_SECRET_KEY }}
  DATABASE_URL: {{ base64 encoded DATABASE_URL }}
  REDIS_URL: {{ base64 encoded REDIS_URL }}
